# Do NOT panic (crash the system) when Out Of Memory occurs
# Instead, let the Linux OOM killer terminate processes to recover memory
# Reason: Kubernetes already manages memory via cgroups and evicts pods safely.
# Crashing the node would cause unnecessary downtime.
vm.panic_on_oom=0


# Allow memory overcommit (allocate more memory than physically available)
# Reason: Many applications (Java, Go, databases) reserve memory but don’t use it immediately.
# Kubernetes enforces actual usage via container limits, so this avoids premature allocation failures.
vm.overcommit_memory=1


# Automatically reboot the system 10 seconds after a kernel panic
# Reason: Ensures node self-recovery without manual intervention.
# Important for production clusters to maintain availability.
kernel.panic=20


# Trigger a full kernel panic if a kernel "oops" (serious error) occurs
# Reason: Prevents the system from continuing in a potentially corrupted or unstable state.
# Combined with kernel.panic=10, this ensures safe fail + automatic recovery.
kernel.panic_on_oops=1